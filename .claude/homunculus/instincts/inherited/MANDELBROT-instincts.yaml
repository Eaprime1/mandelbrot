# MANDELBROT Workflow Entity Feature Development Workflow

## Action

Follow the entity-feature-development-workflow workflow:
1. Create a design/spec file in docs/superpowers/specs/ or docs/plans/
2. Write an implementation plan in docs/superpowers/plans/ or docs/plans/
3. Create directory structure for the entity under terminals/entities/<entity-name>/ and/or terminals/<entity-name>/
4. Add core code modules (e.g., browser_selector.sh, session_manager.sh, spirit.sh, entity_wrapper.sh) in the entity directory
5. Add configuration files under terminals/<entity-name>/config/
6. Add seed/minimal entities under terminals/entities/<entity-name>-simple/ or similar
7. Add README and INSTALL docs in the entity directory
8. Integrate the entity into master_ui.sh or other launcher scripts
9. Add test suite scripts (e.g., test_<entity>.sh)
10. Mark implementation complete with a status file (e.g., STATUS.md) and update the spec with completion status

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: docs/superpowers/specs/*.md, docs/superpowers/plans/*.md, docs/plans/*.md

