name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Short + clear beats long + vague.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see vs. what did you expect?
      placeholder: "Script X printed Y but I expected Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `tools/foo.sh`
        2. Enter option 3
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Ubuntu 22.04, bash 5.1, primehaven @ main"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, prime state at time of failure — anything useful.
    validations:
      required: false
