name: ShellCheck

on:
  push:
    branches: ["main"]
    paths: ["**.sh"]
  pull_request:
    paths: ["**.sh"]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          # Ignore specific warning codes for legacy scripts:
          # SC2034: unused variables — common in sourced scripts
          # SC1091: not following sourced file — files may not exist in CI
          # SC2128: array/string mismatch
          # SC2155: declare+assign masking status
          # SC2178: variable type mismatch
          # SC2207: command substitution splitting
          # SC2221: overlapping patterns
          # SC2222: unreachable patterns
          ignore_codes: |
            SC2034
            SC1091
            SC2128
            SC2155
            SC2178
            SC2207
            SC2221
            SC2222
          scandir: "."
          severity: warning

      - name: Check Spelling
        run: |
          sudo apt-get update && sudo apt-get install -y spell
          find . -name "*.sh" -exec spell {} +
          
