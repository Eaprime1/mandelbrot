name: ShellCheck

on:
  push:
    branches: [ "main" ]
    paths: [ "**.sh" ]
  pull_request:
    paths: [ "**.sh" ]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          # SC2034: unused variables — common in sourced scripts, suppress
          # SC1091: not following sourced file — files may not exist in CI
          # Temporary baseline for legacy scripts while they are incrementally refactored:
          # SC2128 array/string mismatch, SC2155 declare+assign masking status,
          # SC2178 variable type mismatch, SC2207 command substitution splitting,
          # SC2221/SC2222 overlapping or unreachable patterns.
          ignore_codes: SC2034,SC1091,SC2128,SC2155,SC2178,SC2207,SC2221,SC2222
          scandir: "."
          severity: warning
